<div style="padding: 50px;">
<button class="btn btn-outline-secondary" (click)="volverHome()">

⬅ Volver al inicio

</button>
 <h1 class="text-center">Bodegas</h1>
 <br>
 <div class="text mb-3">
    <button class="btn btn-primary" (click)="nuevaBodega()">
    Nueva Bodega
    </button>
</div>

<div class="card p-3 mb-4" *ngIf="mostrarFormulario">

    <div class="row">

    <div class="col">
    <input class="form-control" placeholder="Nombre" [(ngModel)]="bodega.nombre">
    </div>

    <div class="col">
    <input class="form-control" placeholder="Ciudad" [(ngModel)]="bodega.ciudad">
    </div>

    <div class="col">
    <input class="form-control" placeholder="Pais" [(ngModel)]="bodega.pais">
    </div>


    <button *ngIf="!editando" class="btn btn-success" (click)="crearBodega()">
    Crear
    </button>

    <button *ngIf="editando" class="btn btn-warning" (click)="actualizarBodega()">
    Actualizar
    </button>

    </div>

    </div>

 <table class="table table-hover">
    <thead class="table-danger">
        <tr>
            <!-- <th scope="col">Id</th> -->
            <th scope="col">Nombre</th>
            <th scope="col">Ciudad</th>
            <th scope="col">Pais</th>
            <th scope="col">Acciones</th>  
        </tr>

    </thead>
    <tbody>
        <tr *ngFor="let item of bodegasList; let i = index">
            <!-- <th scope="row">{{item.id}}</th> -->
            <td>{{item.nombre}}</td>
            <td>{{item.ciudad}}</td>
            <td>{{item.pais}}</td>
            <td>
            <button class="btn btn-warning btn-sm"
            (click)="editarBodega(item)">
            Editar
            </button>
            |
            <button class="btn btn-danger btn-sm"
            (click)="eliminarBodega(item.id)">
            Eliminar
            </button>
            </td>
        </tr>
    </tbody>

 </table>
</div>
