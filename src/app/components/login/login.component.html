<div class="container" style="margin-top:100px; max-width:400px;">

<h3 class="text-center">Login</h3>

<div class="card p-4">

<div class="mb-3">
<label>Usuario</label>
<input
type="text"
class="form-control"
[(ngModel)]="loginData.username"
>
</div>

<div class="mb-3">
<label>Contraseña</label>
<input
type="password"
class="form-control"
[(ngModel)]="loginData.password"
>
</div>

<button
class="btn btn-primary w-100"
(click)="login()"
>
Ingresar
</button>
<br>

<a routerLink="/registro" class="btn btn-outline-primary w-100">
Crear cuenta
</a>

</div>

</div>
