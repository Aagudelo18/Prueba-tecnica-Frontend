<div style="padding: 50px;">
 <h1 class="text-center">Puertos</h1>
 <br>
 <div class="text mb-3">
    <button class="btn btn-primary" (click)="nuevoPuerto()">
    Nuevo Puerto
    </button>
    </div>

 <div class="card p-3 mb-4" *ngIf="mostrarFormulario">

    <div class="row">

    <div class="col">
    <input class="form-control" placeholder="Nombre" [(ngModel)]="puerto.nombre">
    </div>

    <div class="col">
    <input class="form-control" placeholder="Ciudad" [(ngModel)]="puerto.ciudad">
    </div>

    <div class="col">
    <input class="form-control" placeholder="Pais" [(ngModel)]="puerto.pais">
    </div>

    

    <div class="col">

    <button *ngIf="!editando" class="btn btn-success" (click)="crearPuerto()">
    Crear
    </button>

    <button *ngIf="editando" class="btn btn-warning" (click)="actualizarPuerto()">
    Actualizar
    </button>

    </div>

    </div>
</div>
 <table class="table table-hover">
    <thead class="table-danger">
        <tr>
            <!-- <th scope="col">Id</th> -->
            <th scope="col">Nombre</th>
            <th scope="col">Ciudadr</th>
            <th scope="col">Pais</th>   
            <th scope="col">Acciones</th>   
        </tr>

    </thead>
    <tbody>
        <tr *ngFor="let item of puertosList; let i = index">
            <!-- <th scope="row">{{item.id}}</th> -->
            <td>{{item.nombre}}</td>
            <td>{{item.ciudad}}</td>
            <td>{{item.pais}}</td>
            <td>
            <button class="btn btn-warning btn-sm"
            (click)="editarPuerto(item)">
            Editar
            </button>
            |
            <button class="btn btn-danger btn-sm"
            (click)="eliminarPuerto(item.id)">
            Eliminar
            </button>
            </td>
        </tr>
    </tbody>

 </table>
</div>
