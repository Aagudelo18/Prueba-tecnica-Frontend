<div class="container" style="margin-top:100px; max-width:400px;">

<h3 class="text-center">Registro de Usuario</h3>

<div class="card p-4">

<div class="mb-3">
<label>Usuario</label>
<input
type="text"
class="form-control"
[(ngModel)]="registroData.username"
>
</div>

<div class="mb-3">
<label>Contraseña</label>
<input
type="password"
class="form-control"
[(ngModel)]="registroData.password"
>
</div>

<button
class="btn btn-success w-100"
(click)="registrar()"
>
Registrarse
</button>

<br>

<button
type="button"
class="btn btn-outline-secondary w-100"
routerLink="/login"
>
Ir al Login
</button>

</div>

</div>
